name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff Lint
        run: |
          python -m ruff check .
      
      - name: Ruff Version
        run: |
          python -m ruff --version

      - name: Run Ruff Format Check
        run: |
          python -m ruff format --check .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      PYTHONPATH: .

      APP_NAME: ecommerceai-recommendation-service
      APP_VERSION: 0.1.0
      ENVIRONMENT: test

      DB_URL: ${{ secrets.DB_URL }}
      PLATFORM_DB_URL: ${{ secrets.PLATFORM_DB_URL }}

      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CACHE_TTL: 3600

      TEST_API_KEY: ${{ secrets.TEST_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Tests
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs:
      - lint
      - test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -t ecommerceai-recommendation-service:latest \
            .

      - name: Validate Container Startup
        run: |
          docker run \
            --rm \
            ecommerceai-recommendation-service:latest \
            python -c "from app.main import app; print('Application startup successful')"
