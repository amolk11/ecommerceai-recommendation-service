services:

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: recommendation_test
      POSTGRES_USER: recommendation
      POSTGRES_PASSWORD: recommendation

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recommendation -d recommendation_test"]
      interval: 5s
      timeout: 5s
      retries: 10

    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
